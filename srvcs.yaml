schemaVersion: 1
name: "srvcs-isprime"
slug: "isprime"
repository: "srvcs/isprime"
package: "srvcs-isprime"
function: "number theory: primality test"
kind: "orchestrator"
categories:
  - "number-theory"
dependencies:
  - slug: "isdivisibleby"
    service: "srvcs-isdivisibleby"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "value"
    type: "json"
    required: true
outputs:
  - name: "value"
    type: "json"
  - name: "result"
    type: "boolean"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_ISDIVISIBLEBY_URL"
    default: ""
    purpose: "Base URL for srvcs-isdivisibleby"
